<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>buggle 캡처 편집</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
    <style>
      /* buggle 캡처 편집 — 딥블루/오렌지 팔레트 */
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #16249c; color: #e8ecff; overflow: hidden;
        font: 13px/1.4 "Pretendard", -apple-system, system-ui, "Malgun Gothic", sans-serif; -webkit-font-smoothing: antialiased; }
      #bar {
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        padding: 8px 10px; background: #101c86; border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      #bar .div { width: 1px; height: 22px; background: rgba(255,255,255,0.14); margin: 0 4px; }
      #bar .grow { flex: 1; }
      .tb {
        min-width: 34px; height: 30px; padding: 0 8px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
        background: #22349f; color: #c3cbf3; border: 1px solid rgba(255,255,255,0.07); transition: all 0.15s ease;
      }
      .tb:hover { background: rgba(255,255,255,0.14); color: #fff; }
      .tb.active { background: #e0532e; border-color: #e0532e; color: #fff; box-shadow: 0 6px 16px -4px rgba(224,83,46,0.5); }
      .tb:disabled { opacity: 0.4; cursor: default; }
      .colors { display: flex; gap: 5px; }
      .sw { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
      .sw.active { border-color: #fff; }
      .ctx { display: inline-flex; align-items: center; gap: 4px; color: #aeb8ee; font-size: 12px; }
      .ctx input[type="number"] { width: 52px; height: 26px; background: #16249c; color: #fff; border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 0 6px; }
      .ctx label { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
      .btn { height: 30px; padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
        background: rgba(255,255,255,0.08); color: #cfd6f7; border: 1px solid rgba(255,255,255,0.14); }
      .btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
      .btn.primary { background: #3a52cc; border-color: #3a52cc; color: #fff; }
      .btn.primary:hover { background: #4964dd; }
      .btn.done { background: #e0532e; border-color: #e0532e; color: #fff; box-shadow: 0 8px 20px -6px rgba(224,83,46,0.55); }
      .btn.done:hover { background: #ef6a44; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      /* display:flex + .canvas-container margin:auto → 작을 땐 중앙, 확대해 커지면 전 방향 스크롤(플렉스 중앙정렬의 top/left 잘림 버그 회피). */
      #stage { position: absolute; top: 47px; left: 0; right: 0; bottom: 30px; overflow: auto; display: flex; padding: 16px; }
      #stage::-webkit-scrollbar { width: 8px; height: 8px; }
      #stage::-webkit-scrollbar-thumb { background: #3a52cc; border-radius: 8px; }
      .canvas-container { margin: auto; flex: none; box-shadow: 0 16px 40px rgba(8,12,60,0.55); border-radius: 4px; }
      #hint { position: absolute; left: 0; right: 0; bottom: 0; height: 30px; line-height: 30px; padding: 0 12px; font-size: 11px; color: #8b98e0; background: #101c86; border-top: 1px solid rgba(255,255,255,0.06); }

      /* 줌 컨트롤 — 스테이지 우하단 플로팅 */
      #zoomctl {
        position: absolute; right: 16px; bottom: 40px; z-index: 30;
        display: flex; align-items: center; gap: 2px; padding: 3px;
        background: #101c86; border: 1px solid rgba(255,255,255,0.14); border-radius: 10px;
        box-shadow: 0 8px 24px rgba(8,12,60,0.5);
      }
      #zoomctl button {
        width: 26px; height: 26px; border: 0; border-radius: 7px; cursor: pointer; font-size: 15px; line-height: 1;
        background: transparent; color: #cfd6f7; display: flex; align-items: center; justify-content: center;
      }
      #zoomctl button:hover { background: rgba(255,255,255,0.12); color: #fff; }
      #zoomctl #zoomPct {
        min-width: 46px; text-align: center; font-size: 11.5px; font-weight: 700; color: #fff; cursor: pointer;
        padding: 0 4px; border-radius: 6px;
      }
      #zoomctl #zoomPct:hover { background: rgba(255,255,255,0.1); }

      /* 확인 대화상자 (window.confirm 대체) */
      .hidden { display: none !important; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      @keyframes popin { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
      #confirm {
        position: fixed; inset: 0; z-index: 100; background: rgba(8,12,60,0.62); backdrop-filter: blur(3px);
        display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadein 0.14s ease;
      }
      #confirm .box {
        width: 100%; max-width: 320px; background: #22349f; border: 1px solid rgba(255,255,255,0.12);
        border-radius: 14px; padding: 18px 18px 14px; box-shadow: 0 20px 50px rgba(8,12,60,0.6); animation: popin 0.16s ease;
      }
      #confirm .ico {
        width: 38px; height: 38px; border-radius: 50%; margin: 0 auto 11px; display: flex; align-items: center;
        justify-content: center; background: rgba(224,83,46,0.18); color: #f5a68e;
      }
      #confirm .msg { font-size: 13px; font-weight: 600; color: #fff; text-align: center; line-height: 1.55; }
      #confirm .sub { font-size: 11px; color: #9aa6e8; text-align: center; margin-top: 5px; line-height: 1.5; }
      #confirm .btns { display: flex; gap: 7px; margin-top: 16px; }
      #confirm .btns button { flex: 1; height: 34px; border: 0; border-radius: 9px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
      #confirm #cf-no { background: rgba(255,255,255,0.08); color: #cfd6f7; }
      #confirm #cf-no:hover { background: rgba(255,255,255,0.16); color: #fff; }
      #confirm #cf-yes { background: #e0532e; color: #fff; box-shadow: 0 8px 20px -6px rgba(224,83,46,0.55); }
      #confirm #cf-yes:hover { background: #ef6a44; }
    </style>
  </head>
  <body>
    <div id="bar">
      <div class="tools" style="display:flex;gap:5px">
        <button class="tb" data-tool="select" title="선택 / 이동">선택</button>
        <button class="tb" data-tool="rect" title="사각형">▭</button>
        <button class="tb" data-tool="arrow" title="화살표">↗</button>
        <button class="tb" data-tool="text" title="텍스트">T</button>
        <button class="tb" data-tool="crop" title="자르기">⛶</button>
        <button class="tb" data-tool="stamp" title="번호 스탬프">①</button>
        <button class="tb" data-tool="redact" title="가림 (모자이크/블러)">▦</button>
      </div>
      <span class="div"></span>
      <div class="colors" id="colors"></div>
      <span class="div"></span>
      <span class="ctx" id="ctxStampNext" style="display:none">다음 <input id="nextNum" type="number" min="1" /></span>
      <span class="ctx" id="ctxStampCur" style="display:none">번호 <input id="curNum" type="number" min="1" /></span>
      <span class="ctx" id="ctxText" style="display:none">글자 <input id="textSize" type="number" min="6" /></span>
      <span class="ctx" id="ctxRedact" style="display:none">
        <label><input type="radio" name="rm" value="mosaic" checked /> 모자이크</label>
        <label><input type="radio" name="rm" value="blur" /> 블러</label>
      </span>
      <span class="div"></span>
      <button class="tb" id="undo" title="되돌리기 (Ctrl+Z)">↶</button>
      <button class="tb" id="redo" title="다시실행 (Ctrl+Shift+Z)">↷</button>
      <span class="grow"></span>
      <button class="btn primary" id="cropApply" style="display:none">자르기 적용</button>
      <button class="btn" id="cancel">취소</button>
      <button class="btn done" id="done">완료</button>
    </div>
    <div id="stage"><canvas id="c"></canvas></div>
    <div id="zoomctl">
      <button id="zoomOut" title="축소 (Ctrl+휠 아래)">−</button>
      <span id="zoomPct" title="100%로 맞춤">100%</span>
      <button id="zoomIn" title="확대 (Ctrl+휠 위)">+</button>
    </div>
    <div id="hint"></div>

    <!-- 확인 대화상자 -->
    <div id="confirm" class="hidden">
      <div class="box">
        <div class="ico">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 9v5M12 17.5v.5"/><path d="M10.3 4.3 2.6 18a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/></svg>
        </div>
        <div class="msg" id="cf-msg"></div>
        <div class="sub" id="cf-sub"></div>
        <div class="btns">
          <button id="cf-no">계속 편집</button>
          <button id="cf-yes">저장 안 함</button>
        </div>
      </div>
    </div>
    <script src="./editor.js"></script>
  </body>
</html>
