<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        background: rgba(12, 18, 90, 0.32);
        user-select: none;
      }
      #hint {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: #101c86;
        color: #fff;
        font: 12px/1.4 "Pretendard", -apple-system, system-ui, sans-serif;
        font-weight: 600;
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 24px rgba(8, 12, 60, 0.5);
      }
      #box {
        position: fixed;
        display: none;
        border: 2px solid #e0532e;
        background: rgba(224, 83, 46, 0.1);
        box-shadow: 0 0 0 9999px rgba(12, 18, 90, 0.32);
      }
      #label {
        position: fixed;
        display: none;
        background: #e0532e;
        color: #fff;
        font: 11px/1.4 "Pretendard", -apple-system, system-ui, sans-serif;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 999px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="hint">드래그해서 영역 선택 · Esc 취소</div>
    <div id="box"></div>
    <div id="label"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
