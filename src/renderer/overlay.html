<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        background: rgba(0, 0, 0, 0.28);
        user-select: none;
      }
      #hint {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 12px/1.4 system-ui, sans-serif;
        padding: 6px 12px;
        border-radius: 8px;
      }
      #box {
        position: fixed;
        display: none;
        border: 2px solid #3b82f6;
        background: rgba(59, 130, 246, 0.12);
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.28);
      }
      #label {
        position: fixed;
        display: none;
        background: #3b82f6;
        color: #fff;
        font: 11px/1.4 system-ui, sans-serif;
        padding: 2px 6px;
        border-radius: 4px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="hint">드래그해서 영역 선택 · Esc 취소</div>
    <div id="box"></div>
    <div id="label"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
