<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
    <style>
      /* ===== buggle 캡처 — 딥블루/오렌지 리디자인 ===== */
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: transparent; -webkit-font-smoothing: antialiased; }
      body { font-family: "Pretendard", -apple-system, system-ui, "Malgun Gothic", sans-serif; }
      @keyframes toastin { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
      .bgl-scroll::-webkit-scrollbar { width: 8px; }
      .bgl-scroll::-webkit-scrollbar-thumb { background: #3a52cc; border-radius: 8px; }
      .bgl-scroll::-webkit-scrollbar-track { background: transparent; }
      .hidden { display: none !important; }

      #panel {
        display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        border-radius: 16px; background: #16249c; color: #fff;
        box-shadow: 0 24px 60px -12px rgba(16,24,90,0.45), 0 4px 12px rgba(16,24,90,0.2);
        position: relative;
      }

      /* 타이틀바 */
      header {
        -webkit-app-region: drag; display: flex; align-items: center; gap: 8px;
        height: 42px; padding: 0 10px 0 12px; background: #101c86;
        border-bottom: 1px solid rgba(255,255,255,0.06); flex: none; cursor: move;
      }
      header .logo {
        width: 22px; height: 22px; border-radius: 7px; background: #e0532e; flex: none;
        display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(224,83,46,0.4);
      }
      header .logo i { width: 9px; height: 9px; border-radius: 50%; border: 2px solid #fff; display: block; }
      header .title { font-size: 13.5px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
      header .spacer { flex: 1; }
      header button {
        -webkit-app-region: no-drag; width: 26px; height: 26px; border: 0; padding: 0; border-radius: 7px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        background: transparent; color: #aeb8ee;
      }
      header button:hover { background: rgba(255,255,255,0.08); color: #fff; }
      header button#close:hover { background: #e0532e; color: #fff; }
      header button#collapse svg { transition: transform 0.15s ease; }
      header button#collapse.collapsed svg { transform: rotate(-90deg); }

      /* 캡처 방식 */
      .caps-wrap { -webkit-app-region: no-drag; padding: 12px 12px 9px; flex: none; }
      .caps-label { font-size: 11px; font-weight: 600; color: #aeb8ee; margin: 0 0 7px 2px; letter-spacing: 0.2px; }
      .caps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; position: relative; }
      .caps button {
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        padding: 9px 4px 8px; border-radius: 10px; cursor: pointer;
        background: #22349f; border: 1px solid rgba(255,255,255,0.07); transition: all 0.15s ease;
      }
      .caps button:hover { background: #e0532e; border-color: #e0532e; box-shadow: 0 6px 16px -4px rgba(224,83,46,0.5); }
      .caps button .ico { display: flex; align-items: center; justify-content: center; height: 17px; color: #c3cbf3; }
      .caps button:hover .ico { color: #fff; }
      .caps button .ico .dot { fill: #e0532e; }
      .caps button:hover .ico .dot { fill: #fff; }
      .caps button .txt { font-size: 11px; font-weight: 700; color: #c3cbf3; }
      .caps button:hover .txt { color: #fff; }

      /* 녹화 선택 팝오버 */
      .rec-menu {
        position: absolute; right: 0; top: calc(100% + 6px); z-index: 20; min-width: 168px; white-space: nowrap;
        background: #101c86; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 5px;
        display: flex; flex-direction: column; gap: 3px; box-shadow: 0 12px 28px rgba(8,12,60,0.55);
      }
      .rec-menu button {
        display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 10px; border: 0;
        border-radius: 7px; font-size: 12.5px; font-weight: 600; background: transparent; color: #cfd6f7; cursor: pointer;
      }
      .rec-menu button:hover { background: #e0532e; color: #fff; }

      /* 목록 헤더 */
      .list-head { display: flex; align-items: center; justify-content: space-between; padding: 2px 14px 7px; flex: none; }
      .list-head .lh { font-size: 11px; font-weight: 600; color: #aeb8ee; }
      .list-head #selectAll { font-size: 11px; font-weight: 600; color: #cfd6f7; cursor: pointer; background: none; border: 0; padding: 0; }
      .list-head #selectAll:hover { color: #fff; }

      /* 캡처 목록(2열 카드) */
      #list {
        flex: 1; min-height: 0; overflow-y: auto; padding: 0 12px 6px;
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start;
      }
      #empty { grid-column: 1 / -1; padding: 40px 16px; text-align: center; color: #8b98e0; font-size: 13px; line-height: 1.6; }
      /* 실제 스크린샷은 이미지가 빽빽해 카드끼리 맞닿으면 한 덩어리로 보인다.
         → 카드에 안쪽 여백(액자)을 줘서 썸네일 사이를 항상 띄운다. */
      .item {
        display: flex; flex-direction: column; border-radius: 10px; cursor: pointer; padding: 5px;
        background: #22349f; border: 2px solid rgba(255,255,255,0.10); transition: all 0.12s ease; height: fit-content;
      }
      .item:hover { border-color: rgba(255,255,255,0.24); }
      .item.selected { border-color: #e0532e; background: #2a3cae; }
      .thumb { position: relative; width: 100%; height: 92px; border-radius: 6px; overflow: hidden; }
      /* 스크린샷은 위쪽(제목·헤더)이 식별에 중요 → 가운데가 아닌 상단 기준으로 크롭. */
      .thumb img { display: block; width: 100%; height: 100%; object-fit: cover; object-position: top; background: #1b2a8f; pointer-events: none; }
      .check {
        position: absolute; top: 5px; right: 5px; width: 19px; height: 19px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff;
        background: rgba(12,18,90,0.45); border: 2px solid rgba(255,255,255,0.6);
      }
      .item.selected .check { background: #e0532e; border-color: #fff; box-shadow: 0 2px 6px rgba(224,83,46,0.5); }
      .item.selected .check::after { content: "✓"; }
      .dims {
        position: absolute; left: 6px; bottom: 6px; font-family: ui-monospace, monospace; font-size: 9px; font-weight: 600;
        color: #fff; background: rgba(12,18,90,0.72); padding: 2px 6px; border-radius: 999px; backdrop-filter: blur(2px);
      }
      .gifbadge {
        position: absolute; left: 8px; top: 7px; font-size: 9px; font-weight: 800; letter-spacing: 0.03em;
        color: #fff; background: rgba(12,18,90,0.72); padding: 2px 6px; border-radius: 5px; backdrop-filter: blur(2px);
      }
      .used {
        position: absolute; right: 8px; bottom: 8px; font-size: 9px; font-weight: 700;
        color: #fff; background: rgba(46,160,110,0.85); padding: 2px 6px; border-radius: 5px;
      }
      .meta { display: flex; align-items: center; justify-content: space-between; padding: 5px 2px 0; gap: 4px; }
      .meta .time { font-size: 10px; color: #9aa6e8; white-space: nowrap; }
      .acts { display: flex; gap: 3px; }
      .acts button {
        font-size: 10px; font-weight: 600; padding: 3px 6px; border: 0; border-radius: 5px; cursor: pointer;
        background: rgba(255,255,255,0.08); color: #cfd6f7;
      }
      .acts button:hover { background: rgba(255,255,255,0.16); color: #fff; }
      .acts button[data-del] { background: rgba(224,83,46,0.14); color: #f5a68e; }
      .acts button[data-del]:hover { background: rgba(224,83,46,0.28); color: #fff; }

      /* 푸터 */
      footer.tip-bar {
        display: flex; align-items: center; gap: 10px; padding: 7px 12px 9px; background: #101c86;
        font-size: 10px; color: #8b98e0; flex: none;
      }
      footer.tip-bar b { color: #cfd6f7; font-weight: 700; }
      footer.tip-bar .grow { flex: 1; }
      #clearAll {
        display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #f5a68e;
        padding: 4px 9px; border: 0; border-radius: 6px; background: rgba(224,83,46,0.14); cursor: pointer; white-space: nowrap;
      }
      #clearAll:hover { background: rgba(224,83,46,0.28); color: #fff; }

      /* 토스트 */
      #toast {
        position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); z-index: 30;
        background: #0c1568; color: #fff; font-size: 11.5px; font-weight: 600; padding: 7px 14px; border-radius: 999px;
        box-shadow: 0 8px 24px rgba(8,12,60,0.5); border: 1px solid rgba(255,255,255,0.1);
        animation: toastin 0.2s ease; white-space: nowrap;
      }

      /* 맨 위로 */
      #toTop {
        position: absolute; right: 14px; bottom: 48px; z-index: 25; width: 27px; height: 27px; border: 0;
        border-radius: 50%; padding: 0; font-size: 14px; background: #e0532e; color: #fff; cursor: pointer;
        box-shadow: 0 6px 16px rgba(224,83,46,0.45); display: none; align-items: center; justify-content: center;
      }
      #toTop.show { display: flex; }
      #toTop:hover { background: #ef6a44; }

      /* 설정 패널 */
      #settings { position: absolute; inset: 0; background: #16249c; z-index: 40; display: flex; flex-direction: column; border-radius: 16px; }
      #settings .set-head {
        display: flex; align-items: center; height: 52px; padding: 0 12px 0 16px; background: #101c86;
        font-size: 14px; font-weight: 700; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      #settings .set-head .spacer { flex: 1; }
      #settings .set-head button {
        width: 30px; height: 30px; border: 0; border-radius: 8px; background: transparent; color: #aeb8ee; cursor: pointer;
      }
      #settings .set-head button:hover { background: #e0532e; color: #fff; }
      #settings .set-body { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 16px; }
      .hk-group { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 12px 6px; background: #1a2aa4; }
      .hk-group .grp-title { color: #aeb8ee; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
      .hkrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-top: 1px solid rgba(255,255,255,0.06); }
      .hkrow:first-of-type { border-top: none; }
      .hkrow .lab { font-size: 12.5px; color: #e8ecff; }
      .hkctrl { display: flex; align-items: center; gap: 6px; }
      .hk-rec {
        min-width: 128px; padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
        background: #22349f; border: 1px solid rgba(255,255,255,0.14); color: #fff;
      }
      .hk-rec:hover { border-color: rgba(255,255,255,0.3); }
      .hk-rec.rec { border-color: #e0532e; background: rgba(224,83,46,0.18); color: #ffd9cd; }
      .hk-rec.empty { color: #8b98e0; }
      .hk-clear {
        width: 26px; height: 26px; border: 0; border-radius: 7px; cursor: pointer;
        background: rgba(255,255,255,0.06); color: #9aa6e8; font-size: 12px;
      }
      .hk-clear:hover { background: rgba(224,83,46,0.28); color: #fff; }
      /* 보관 설정 그룹 */
      .store-group { margin-top: 10px; }
      .setrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-top: 1px solid rgba(255,255,255,0.06); }
      .setrow:first-of-type { border-top: none; }
      .setrow .lab { font-size: 12.5px; color: #e8ecff; }
      .setrow input[type="number"] {
        width: 72px; padding: 6px 8px; border-radius: 7px; font-size: 12px; text-align: right;
        background: #22349f; border: 1px solid rgba(255,255,255,0.14); color: #fff;
      }
      .setrow input[type="number"]:focus { outline: none; border-color: #e0532e; }
      .store-group .danger {
        width: 100%; margin: 6px 0 4px; padding: 8px; border: 0; border-radius: 8px; cursor: pointer;
        font-size: 12px; font-weight: 700; color: #f5a68e; background: rgba(224,83,46,0.14);
      }
      .store-group .danger:hover { background: rgba(224,83,46,0.28); color: #fff; }
      #settings .set-hint { color: #8b98e0; font-size: 10.5px; line-height: 1.6; padding: 0 16px 10px; }
      #settings .set-hint b { color: #cfd6f7; }
      #settings .set-foot { padding: 12px 16px 14px; background: #101c86; display: flex; gap: 8px; }
      #settings .set-foot button { flex: 1; height: 38px; border: 0; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
      #settings .set-foot #set-cancel { background: rgba(255,255,255,0.08); color: #cfd6f7; }
      #settings .set-foot #set-cancel:hover { background: rgba(255,255,255,0.16); color: #fff; }
      #settings .set-foot #set-save { background: #e0532e; color: #fff; box-shadow: 0 8px 20px -6px rgba(224,83,46,0.55); }
      #settings .set-foot #set-save:hover { background: #ef6a44; }

      /* 확인 대화상자 (window.confirm 대체) */
      #confirm {
        position: absolute; inset: 0; z-index: 50; border-radius: 16px;
        background: rgba(8,12,60,0.62); backdrop-filter: blur(3px);
        display: flex; align-items: center; justify-content: center; padding: 20px;
        animation: fadein 0.14s ease;
      }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      @keyframes popin { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
      #confirm .box {
        width: 100%; max-width: 296px; background: #22349f; border: 1px solid rgba(255,255,255,0.12);
        border-radius: 14px; padding: 18px 18px 14px; box-shadow: 0 20px 50px rgba(8,12,60,0.6);
        animation: popin 0.16s ease;
      }
      #confirm .ico {
        width: 38px; height: 38px; border-radius: 50%; margin: 0 auto 11px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(224,83,46,0.18); color: #f5a68e;
      }
      #confirm .msg { font-size: 13px; font-weight: 600; color: #fff; text-align: center; line-height: 1.55; }
      #confirm .sub { font-size: 11px; color: #9aa6e8; text-align: center; margin-top: 5px; line-height: 1.5; }
      #confirm .btns { display: flex; gap: 7px; margin-top: 16px; }
      #confirm .btns button { flex: 1; height: 34px; border: 0; border-radius: 9px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
      #confirm #cf-no { background: rgba(255,255,255,0.08); color: #cfd6f7; }
      #confirm #cf-no:hover { background: rgba(255,255,255,0.16); color: #fff; }
      #confirm #cf-yes { background: #e0532e; color: #fff; box-shadow: 0 8px 20px -6px rgba(224,83,46,0.55); }
      #confirm #cf-yes:hover { background: #ef6a44; }
    </style>
  </head>
  <body>
    <div id="panel">
      <header>
        <span class="logo"><i></i></span>
        <span class="title">buggle 캡처</span>
        <span class="spacer"></span>
        <button id="settings-open" title="단축키 설정">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg>
        </button>
        <button id="collapse" title="접기/펼치기">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 9l6 6 6-6z"/></svg>
        </button>
        <button id="close" title="숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>

      <div class="caps-wrap" id="caps">
        <div class="caps-label">캡처 방식</div>
        <div class="caps">
          <button data-cap="full" title="전체 화면 캡처">
            <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/></svg></span>
            <span class="txt">전체</span>
          </button>
          <button data-cap="region" title="선택 영역 캡처(드래그)">
            <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="3 3"/></svg></span>
            <span class="txt">영역</span>
          </button>
          <button data-cap="fixed" title="고정 영역 캡처">
            <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 3h6l-1 6 3 2v2H7v-2l3-2-1-6z"/></svg></span>
            <span class="txt">고정</span>
          </button>
          <button id="recBtn" title="화면 녹화(GIF)">
            <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle class="dot" cx="12" cy="12" r="6"/></svg></span>
            <span class="txt">녹화</span>
          </button>
          <div id="recMenu" class="rec-menu hidden">
            <button data-rec="full">전체 화면 녹화</button>
            <button data-rec="region">영역 지정 녹화</button>
          </div>
        </div>
      </div>

      <div class="list-head">
        <span class="lh">캡처 도우미 · 첨부할 항목 선택</span>
        <button id="selectAll">전체 선택</button>
      </div>

      <div id="list" class="bgl-scroll">
        <div id="empty">캡처한 항목이 없습니다.<br />단축키를 눌러 화면을 캡처해 보세요.</div>
      </div>

      <footer class="tip-bar">
        <span id="tip"><b>Ctrl+클릭</b> 다중선택 · <b>Ctrl+C</b> 복사 · <b>Del</b> 삭제</span>
        <span class="grow"></span>
        <button id="clearAll" title="모든 캡처 삭제">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
          전체 삭제
        </button>
      </footer>

      <button id="toTop" title="맨 위로">&#8593;</button>
      <div id="toast" class="hidden"></div>

      <!-- 확인 대화상자 -->
      <div id="confirm" class="hidden">
        <div class="box">
          <div class="ico">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
          </div>
          <div class="msg" id="cf-msg"></div>
          <div class="sub" id="cf-sub"></div>
          <div class="btns">
            <button id="cf-no">취소</button>
            <button id="cf-yes">삭제</button>
          </div>
        </div>
      </div>

      <!-- 단축키 설정 -->
      <div id="settings" class="hidden">
        <div class="set-head">
          <span>단축키 설정</span>
          <span class="spacer"></span>
          <button id="settings-close" title="닫기">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div class="set-body">
          <div class="hk-group" id="hk-group">
            <div class="grp-title">단축키</div>
            <!-- .hkrow 는 JS가 채웁니다 -->
          </div>
          <div class="hk-group store-group">
            <div class="grp-title">보관</div>
            <div class="setrow">
              <span class="lab">최대 보관 개수</span>
              <input type="number" id="set-maxitems" min="1" max="1000" />
            </div>
            <div class="setrow">
              <span class="lab">보관 기간(일)</span>
              <input type="number" id="set-retention" min="1" max="365" />
            </div>
            <button type="button" id="set-clearall" class="danger">저장된 캡처 전체 삭제</button>
          </div>
        </div>
        <div class="set-hint">입력칸을 클릭한 뒤 원하는 키를 누르면 실시간 표시됩니다(단독 키도 가능). <b>Enter</b> 또는 다른 곳 클릭 시 지정 · <b>Esc</b> 취소 · <b>✕</b> 비활성. 개수·기간을 넘거나 전체 삭제하면 저장 공간에서 지워집니다.</div>
        <div class="set-foot">
          <button id="set-cancel">취소</button>
          <button id="set-save">저장</button>
        </div>
      </div>
    </div>
