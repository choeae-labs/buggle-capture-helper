<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
      /* 창 전체를 채우는 액자 — 테두리·라운드·그림자. */
      #frame {
        width: 100vw; height: 100vh; padding: 4px;
        background: #101c86; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
        box-shadow: 0 24px 60px rgba(8,12,60,0.7);
      }
      #img {
        display: block; width: 100%; height: 100%; object-fit: contain;
        border-radius: 7px; background: #1b2a8f;
      }
    </style>
  </head>
  <body>
    <div id="frame"><img id="img" alt="" /></div>
    <script src="./zoom.js"></script>
  </body>
</html>
